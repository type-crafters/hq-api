<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form id="form">
        <label style="display: block" for="title">Title</label>
        <input type="text" name="title" id="title">
        <label style="display: block" for="details">Details</label>
        <input type="text" name="details" id="details">
        <label style="display: block" for="description">Description</label>
        <textarea name="description" id="description"></textarea>
        <label style="display: block" for="img">Image</label>
        <input type="file" name="img" id="img">
        <label style="display: block">Href</label>
        <input type="text" name="href" id="href">
        <input type="submit" value="Nigger">
    </form>
    <p id="feedback"></p>
    <script>
        const form = document.getElementById("form");
        const p = document.getElementById("feedback");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            try {
                const response = await fetch("https://ig5xwimt22.execute-api.us-east-1.amazonaws.com/projects", {
                    method: "POST",
                    body: formData
                });

                p.innerText = JSON.stringify(await response.json(), null, 2);

            } catch (error) {
                p.style.color = "red";
                p.innerHTML = error;
                console.error(error);
            }
        });
    </script>
    <script>
        document.getElementById("title").value = "title #1";
        document.getElementById("details").value = "descriptive sentence";
        document.getElementById("description").value = "public static void main(string[] args) {}";
        document.getElementById("href").value = "https://example.com/n?source=typecrafters";   
    </script>
</body>

</html>
